name: CI Pipeline

on:
  push:
    branches: [ develop ]
    paths-ignore: [ '**.md', 'docs/**', '.gitignore' ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Dev Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pre-commit (Ruff, Format, Bandit, Secrets)
        uses: pre-commit/action@v3.0.1

      - name: Run pip-audit
        run: pip install pip-audit && pip-audit

      - name: Run Mypy
        run: pip install mypy && mypy src/

  unit-tests:
    name: Unit Tests
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Unit Tests
        run: pytest tests/ -m "unit" -v --tb=short

  integration-tests:
    name: Integration Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Integration Tests
        run: pytest tests/ -m "integration" -v --tb=short --no-cov

  e2e-tests:
    name: E2E Tests
    needs: integration-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run E2E Tests
        run: pytest tests/ -m "e2e" -v --tb=short
