version = 1
name = "codex-django"

[setup]
script = ""

[setup.win32]
script = '''
$ErrorActionPreference = "Stop"

# Работаем внутри нового worktree, а не исходного репо
Set-Location $env:CODEX_WORKTREE_PATH

# Локальный кэш, чтобы окружение было изолированным
$env:UV_CACHE_DIR = Join-Path $env:CODEX_WORKTREE_PATH ".uv-cache"

# Поднять dev-окружение проекта
uv sync --extra dev
'''

[cleanup]
script = '''
Set-Location $env:CODEX_WORKTREE_PATH
if (Test-Path ".pytest_cache") { Remove-Item ".pytest_cache" -Recurse -Force }
if (Test-Path ".mypy_cache") { Remove-Item ".mypy_cache" -Recurse -Force }
if (Test-Path ".ruff_cache") { Remove-Item ".ruff_cache" -Recurse -Force }
'''
