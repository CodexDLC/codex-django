{% load i18n %}
<div class="row g-4">
  <div class="col-md-8">

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Impressum</h6>
      </div>
      <div class="card-body">
        <div class="text-muted mb-2" style="font-size:.8rem;">
          Юридические реквизиты компании. Отображается на странице «О компании».
        </div>
        <textarea class="form-control form-control-sm"
                  rows="5"
                  placeholder="ООО «Мой Бизнес», ОГРН 1234567890123, ИНН 7701234567..."
                  style="font-size:.85rem; resize:vertical;">ООО «Мой Бизнес»
ОГРН: 1234567890123
ИНН/КПП: 7701234567 / 770101001
Юридический адрес: 125009, г. Москва, ул. Тверская, д. 12, офис 301
Генеральный директор: Иванов Иван Иванович</textarea>
        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-primary btn-sm px-4">Сохранить</button>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Политика конфиденциальности</h6>
      </div>
      <div class="card-body">
        <div class="text-muted mb-2" style="font-size:.8rem;">HTML-контент страницы Privacy Policy.</div>
        <textarea class="form-control form-control-sm font-monospace"
                  rows="5"
                  placeholder="&lt;p&gt;Ваша политика конфиденциальности...&lt;/p&gt;"
                  style="font-size:.8rem; resize:vertical;"></textarea>
        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-primary btn-sm px-4">Сохранить</button>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Пользовательское соглашение</h6>
      </div>
      <div class="card-body">
        <div class="text-muted mb-2" style="font-size:.8rem;">HTML-контент страницы Terms of Service.</div>
        <textarea class="form-control form-control-sm font-monospace"
                  rows="5"
                  placeholder="&lt;p&gt;Условия использования...&lt;/p&gt;"
                  style="font-size:.8rem; resize:vertical;"></textarea>
        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-primary btn-sm px-4">Сохранить</button>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Cookie Policy</h6>
      </div>
      <div class="card-body">
        <div class="text-muted mb-2" style="font-size:.8rem;">HTML-контент страницы политики использования cookie.</div>
        <textarea class="form-control form-control-sm font-monospace"
                  rows="5"
                  placeholder="&lt;p&gt;Мы используем cookie...&lt;/p&gt;"
                  style="font-size:.8rem; resize:vertical;"></textarea>
        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-primary btn-sm px-4">Сохранить</button>
        </div>
      </div>
    </div>

  </div>
</div>
