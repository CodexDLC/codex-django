{% load i18n %}
<div class="row g-4">
  <div class="col-12">

    <div class="card border-0 shadow-sm mb-4">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">{% trans "Email Identity" %}</h6>
      </div>
      <div class="card-body d-flex flex-column gap-3">

        <div class="alert alert-info py-2 px-3 mb-0" style="font-size:.8rem;">
          {% blocktrans %}SMTP transport (host, port, credentials, TLS) is configured via environment variables (<code>EMAIL_*</code> in <code>.env</code>) and cannot be edited here. Only branding fields below — who outgoing emails appear to be from.{% endblocktrans %}
        </div>

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">{% trans "From Email" %}</label>
          <input type="email" name="email_from" value="{{ settings_data.email_from|default:'' }}"
                 class="form-control form-control-sm border-0 bg-light" placeholder="info@example.com">
        </div>

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">{% trans "Sender Name" %}</label>
          <input type="text" name="email_sender_name" value="{{ settings_data.email_sender_name|default:'' }}"
                 class="form-control form-control-sm border-0 bg-light" placeholder="My Company">
        </div>

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">{% trans "Reply-To" %}</label>
          <input type="email" name="email_reply_to" value="{{ settings_data.email_reply_to|default:'' }}"
                 class="form-control form-control-sm border-0 bg-light" placeholder="support@example.com">
        </div>

      </div>
    </div>

  </div>
</div>
