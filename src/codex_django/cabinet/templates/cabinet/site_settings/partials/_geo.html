{% load i18n %}
<div class="row g-4">
  <div class="col-md-7">

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Расположение</h6>
      </div>
      <div class="card-body d-flex flex-column gap-3">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Ссылка Google Maps</label>
          <div class="d-flex align-items-center justify-content-between gap-3">
            <span class="text-truncate" style="font-size:.9rem; max-width: 340px;">
              https://maps.google.com/?q=55.7558,37.6173
            </span>
            <button class="btn btn-sm btn-outline-secondary flex-shrink-0">Изменить</button>
          </div>
        </div>
        <hr class="my-0">

        <div class="row g-3">
          <div class="col-6">
            <label class="form-label text-muted mb-1" style="font-size:.8rem;">Широта</label>
            <div style="font-size:.9rem;">55.755826</div>
          </div>
          <div class="col-6">
            <label class="form-label text-muted mb-1" style="font-size:.8rem;">Долгота</label>
            <div style="font-size:.9rem;">37.617300</div>
          </div>
        </div>

        <div class="d-flex justify-content-end pt-1">
          <button class="btn btn-primary btn-sm px-4">Сохранить</button>
        </div>

      </div>
    </div>

    {# Placeholder карты #}
    <div class="card border-0 shadow-sm">
      <div class="card-body p-0 overflow-hidden" style="border-radius: .5rem;">
        <div class="d-flex align-items-center justify-content-center bg-light"
             style="height: 200px; border-radius: .5rem;">
          <div class="text-center text-muted">
            <span class="bi bi-map fs-1 d-block mb-2" style="opacity:.3;"></span>
            <span style="font-size:.85rem;">Предпросмотр карты</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
