{% load i18n %}
<div class="row g-4">
  <div class="col-md-7">

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Контактная информация</h6>
      </div>
      <div class="card-body d-flex flex-column gap-3">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Телефон</label>
          <div class="d-flex align-items-center justify-content-between">
            <span style="font-size:.9rem;">+7 (495) 123-45-67</span>
            <button class="btn btn-sm btn-outline-secondary">Изменить</button>
          </div>
        </div>
        <hr class="my-0">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Email</label>
          <div class="d-flex align-items-center justify-content-between">
            <span style="font-size:.9rem;">info@mycompany.ru</span>
            <button class="btn btn-sm btn-outline-secondary">Изменить</button>
          </div>
        </div>
        <hr class="my-0">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Контактное лицо</label>
          <div class="d-flex align-items-center justify-content-between">
            <span style="font-size:.9rem;">Иванова Анна Сергеевна</span>
            <button class="btn btn-sm btn-outline-secondary">Изменить</button>
          </div>
        </div>
        <hr class="my-0">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Часы работы</label>
          <div class="d-flex align-items-center justify-content-between">
            <span style="font-size:.9rem;">Пн–Пт: 09:00–19:00, Сб: 10:00–16:00</span>
            <button class="btn btn-sm btn-outline-secondary">Изменить</button>
          </div>
        </div>

      </div>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Адрес</h6>
      </div>
      <div class="card-body d-flex flex-column gap-3">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Улица и дом</label>
          <div class="d-flex align-items-center justify-content-between">
            <span style="font-size:.9rem;">ул. Тверская, д. 12, офис 301</span>
            <button class="btn btn-sm btn-outline-secondary">Изменить</button>
          </div>
        </div>
        <hr class="my-0">

        <div class="row g-3">
          <div class="col-8">
            <label class="form-label text-muted mb-1" style="font-size:.8rem;">Город</label>
            <div style="font-size:.9rem;">Москва</div>
          </div>
          <div class="col-4">
            <label class="form-label text-muted mb-1" style="font-size:.8rem;">Индекс</label>
            <div style="font-size:.9rem;">125009</div>
          </div>
        </div>

        <div class="d-flex justify-content-end pt-1">
          <button class="btn btn-primary btn-sm px-4">Сохранить</button>
        </div>

      </div>
    </div>

  </div>
</div>
