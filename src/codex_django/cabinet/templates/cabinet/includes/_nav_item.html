{# [LIBRARY] Single sidebar navigation item. Accepts: item (SidebarItem) — OR — individual vars: url, icon, label, badge, active, disabled #}
<li>
  <a href="{% if item %}{{ item.url }}{% elif disabled %}#{% else %}{{ url }}{% endif %}"
     class="cab-nav__item{% if active or item.active %} cab-nav__item--active{% endif %}"
     {% if disabled or item.disabled %}style="opacity:.45;cursor:not-allowed;pointer-events:none;"{% endif %}>
    <i class="bi {% if item %}{{ item.icon }}{% else %}{{ icon }}{% endif %} cab-nav__icon"></i>
    <span class="cab-nav__label">{% if item %}{{ item.label }}{% else %}{{ label }}{% endif %}</span>
    {% if badge %}
      <span class="cab-nav__badge">{{ badge }}</span>
    {% elif item.badge %}
      <span class="cab-nav__badge">{{ item.badge }}</span>
    {% endif %}
  </a>
</li>
