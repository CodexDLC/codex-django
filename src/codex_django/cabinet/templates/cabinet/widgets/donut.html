<div class="card border-0 shadow-sm h-100"
     x-data="donutWidget({{ data|jsonify }})">
  <div class="card-header bg-white border-0 pt-3 pb-0">
    <h6 class="fw-semibold mb-0" style="font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:#64748b;">
      <template x-if="config.icon">
        <span class="bi me-2" :class="config.icon" style="color:var(--cab-primary);"></span>
      </template>
      <span x-text="config.title"></span>
    </h6>
  </div>
  <div class="card-body d-flex align-items-center gap-4">
    <div style="width:140px;height:140px;flex-shrink:0;position:relative;">
      <canvas x-ref="canvas"></canvas>
    </div>
    <ul class="list-unstyled mb-0 flex-grow-1">
      <template x-for="item in legend">
        <li class="d-flex align-items-center justify-content-between mb-1" style="font-size:.75rem;">
          <div class="d-flex align-items-center gap-2">
            <span class="rounded-circle" style="width:8px;height:8px;" :style="{ background: item.color }"></span>
            <span x-text="item.label"></span>
          </div>
          <span class="fw-semibold" x-text="item.value"></span>
        </li>
      </template>
    </ul>
  </div>
</div>
