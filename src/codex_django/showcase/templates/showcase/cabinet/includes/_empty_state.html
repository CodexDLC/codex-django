<div class="text-center py-5 my-3">
  <span class="bi {{ icon|default:'bi-inbox' }}" style="font-size:2.5rem;color:#cbd5e1;display:block;margin-bottom:12px;"></span>
  <div class="fw-semibold mb-1" style="color:#475569;">{{ title }}</div>
  {% if subtitle %}<div class="text-muted" style="font-size:.82rem;">{{ subtitle }}</div>{% endif %}
  {% if action_label and action_url %}
  <a href="{{ action_url }}" class="btn btn-sm btn-primary mt-3">{{ action_label }}</a>
  {% endif %}
</div>
