<div class="d-flex align-items-start justify-content-between mb-4">
  <div>
    <h5 class="fw-semibold mb-0" style="color:#0f172a;">{{ title }}</h5>
    {% if subtitle %}<span class="text-muted" style="font-size:.82rem;">{{ subtitle }}</span>{% endif %}
  </div>
  {% if btn_label %}
  <a href="{{ btn_url|default:'#' }}" class="btn btn-sm btn-primary d-flex align-items-center gap-1" style="font-size:.82rem;">
    {% if btn_icon %}<span class="bi {{ btn_icon }}"></span>{% endif %}
    {{ btn_label }}
  </a>
  {% endif %}
</div>
