{% extends "cabinet/base_cabinet.html" %}

{% block title %}Booking - {{ page_title }}{% endblock %}

{% block cabinet_content %}
<div class="d-flex align-items-center justify-content-between gap-3 mb-3 flex-wrap">
  <div>
    <h1 class="h5 mb-1">{{ page_title }}</h1>
    <p class="text-muted mb-0" style="font-size:.875rem;">All bookings log</p>
  </div>
  <a class="btn btn-sm btn-primary" href="{{ booking_new_url }}">
    <span class="bi bi-plus-lg me-1"></span>New booking
  </a>
</div>

{% include "cabinet/components/data_table.html" with table=table %}
{% endblock %}
