{% load i18n %}
<div class="row g-4">
  <div class="col-md-8">

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Impressum</h6>
      </div>
      <div class="card-body">
        <div class="text-muted mb-2" style="font-size:.8rem;">
          Legal company details. Displayed on the "About Us" page.
        </div>
        <textarea class="form-control form-control-sm"
                  rows="5"
                  placeholder="My Business LLC, CIN 1234567890, Tax ID 7701234567..."
                  style="font-size:.85rem; resize:vertical;">My Business LLC
Company ID: 1234567890123
Tax ID: 7701234567 / 770101001
Legal Address: 123 Main St, New York, NY 10001
CEO: John Doe</textarea>
        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-primary btn-sm px-4">Save</button>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Privacy Policy</h6>
      </div>
      <div class="card-body">
        <div class="text-muted mb-2" style="font-size:.8rem;">HTML content of the Privacy Policy page.</div>
        <textarea class="form-control form-control-sm font-monospace"
                  rows="5"
                  placeholder="&lt;p&gt;Your privacy policy...&lt;/p&gt;"
                  style="font-size:.8rem; resize:vertical;"></textarea>
        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-primary btn-sm px-4">Save</button>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Terms of Service</h6>
      </div>
      <div class="card-body">
        <div class="text-muted mb-2" style="font-size:.8rem;">HTML content of the Terms of Service page.</div>
        <textarea class="form-control form-control-sm font-monospace"
                  rows="5"
                  placeholder="&lt;p&gt;Terms of use...&lt;/p&gt;"
                  style="font-size:.8rem; resize:vertical;"></textarea>
        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-primary btn-sm px-4">Save</button>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Cookie Policy</h6>
      </div>
      <div class="card-body">
        <div class="text-muted mb-2" style="font-size:.8rem;">HTML content of the Cookie Policy page.</div>
        <textarea class="form-control form-control-sm font-monospace"
                  rows="5"
                  placeholder="&lt;p&gt;We use cookies...&lt;/p&gt;"
                  style="font-size:.8rem; resize:vertical;"></textarea>
        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-primary btn-sm px-4">Save</button>
        </div>
      </div>
    </div>

  </div>
</div>
