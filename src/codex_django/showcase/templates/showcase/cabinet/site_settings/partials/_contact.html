{% load i18n %}
<div class="row g-4">
  <div class="col-md-7">

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Contact Information</h6>
      </div>
      <div class="card-body d-flex flex-column gap-3">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Phone</label>
          <div class="d-flex align-items-center justify-content-between">
            <span style="font-size:.9rem;">+1 (555) 123-4567</span>
            <button class="btn btn-sm btn-outline-secondary">Change</button>
          </div>
        </div>
        <hr class="my-0">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Email</label>
          <div class="d-flex align-items-center justify-content-between">
            <span style="font-size:.9rem;">info@mycompany.com</span>
            <button class="btn btn-sm btn-outline-secondary">Change</button>
          </div>
        </div>
        <hr class="my-0">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Contact Person</label>
          <div class="d-flex align-items-center justify-content-between">
            <span style="font-size:.9rem;">Anna S. Johnson</span>
            <button class="btn btn-sm btn-outline-secondary">Change</button>
          </div>
        </div>
        <hr class="my-0">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Working Hours</label>
          <div class="d-flex align-items-center justify-content-between">
            <span style="font-size:.9rem;">Mo–Fr: 09:00–19:00, Sa: 10:00–16:00</span>
            <button class="btn btn-sm btn-outline-secondary">Change</button>
          </div>
        </div>

      </div>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">Address</h6>
      </div>
      <div class="card-body d-flex flex-column gap-3">

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">Street and Building</label>
          <div class="d-flex align-items-center justify-content-between">
            <span style="font-size:.9rem;">123 Main St, Apt 4</span>
            <button class="btn btn-sm btn-outline-secondary">Change</button>
          </div>
        </div>
        <hr class="my-0">

        <div class="row g-3">
          <div class="col-8">
            <label class="form-label text-muted mb-1" style="font-size:.8rem;">City</label>
            <div style="font-size:.9rem;">New York</div>
          </div>
          <div class="col-4">
            <label class="form-label text-muted mb-1" style="font-size:.8rem;">Zip Code</label>
            <div style="font-size:.9rem;">10001</div>
          </div>
        </div>

        <div class="d-flex justify-content-end pt-1">
          <button class="btn btn-primary btn-sm px-4">Save</button>
        </div>

      </div>
    </div>

  </div>
</div>
